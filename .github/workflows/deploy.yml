name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: 195.161.69.221
          username: root
          password: Nikitoso02-
          port: 22
          source: "."
          target: "/root/shinsetsu-hair"
          rm: false

      - name: Install Dependencies and Restart Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 195.161.69.221
          username: root
          password: Nikitoso02-
          port: 22
          script: |
            cd /root/shinsetsu-hair
            
            # Устанавливаем зависимости
            if [ -f "requirements.txt" ]; then
                pip3 install --break-system-packages -r requirements.txt -q
            fi
            
            # Устанавливаем и перезапускаем systemd-сервис
            cp shinsetsu-hair.service /etc/systemd/system/shinsetsu-hair.service
            systemctl daemon-reload
            systemctl enable shinsetsu-hair
            systemctl restart shinsetsu-hair
            sleep 3
            
            # Проверяем запуск
            if systemctl is-active --quiet shinsetsu-hair; then
                echo "✓ Application started successfully via systemd"
            else
                echo "✗ Application failed to start!"
                journalctl -u shinsetsu-hair --no-pager -n 20
                exit 1
            fi
            
            echo "Deployment successful!"

